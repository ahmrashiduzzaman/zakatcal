/* ═══════════════════════════════════════════
   GEMINI API CALL
   - No backend needed! Direct browser → Gemini
   - Gemini supports CORS from browsers
═══════════════════════════════════════════ */
const callGemini=async(history,apiKey)=>{
  // Convert {role,content} → Gemini format {role, parts:[{text}]}
  // Gemini uses "model" instead of "assistant"
  const contents=history.map(m=>({
    role: m.role==='assistant'?'model':m.role,
    parts:[{text:m.content}]
  }));

  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:SYS}]},
        contents,
        generationConfig:{
          maxOutputTokens:600,
          temperature:0.7
        }
      })
    }
  );

  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    const msg=err?.error?.message||`HTTP ${res.status}`;
    throw new Error(msg);
  }

  const d=await res.json();
  const text=d?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error('Gemini থেকে কোনো উত্তর আসেনি।');
  return text;
};

const fmtBDT=n=>{
  if(!n||isNaN(n))return'৳০';
  const v=Math.abs(Math.round(n));
  if(v>=10000000)return`৳${(v/10000000).toFixed(2)} কোটি`;
  if(v>=100000)  return`৳${(v/100000).toFixed(2)} লক্ষ`;
  if(v>=1000)    return`৳${(v/1000).toFixed(1)} হাজার`;
  return`৳${v.toLocaleString('en-IN')}`;
};

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
function App(){
  const[screen,setScreen]  =useState('splash');
  const[apiKey,setApiKey]  =useState(()=>localStorage.getItem(LS_KEY)||'');
  const[showModal,setModal]=useState(false);
  const[msgs,setMsgs]      =useState([]);
  const[input,setInput]    =useState('');
  const[loading,setLoad]   =useState(false);
  const[recording,setRec]  =useState(false);
  const[result,setResult]  =useState(null);
  const[history,setHist]   =useState([]);
  const[initBusy,setIB]    =useState(false);

  const bottomRef=useRef(null);
  const recRef   =useRef(null);

  // Show modal if no key saved
  useEffect(()=>{
    if(!localStorage.getItem(LS_KEY)) setModal(true);
  },[]);

  // Auto-scroll
  useEffect(()=>{
    const t=setTimeout(()=>
      bottomRef.current?.scrollIntoView({behavior:'smooth'}),90);
    return()=>clearTimeout(t);
  },[msgs,loading]);

  const handleKeySave=useCallback(k=>{
    setApiKey(k);setModal(false);
  },[]);

  // Start conversation
  const startChat=useCallback(async()=>{
    const key=localStorage.getItem(LS_KEY);
    if(!key){setModal(true);return;}
    setIB(true);setScreen('chat');setLoad(true);
    const init=[{role:'user',content:'যাকাত হিসাব করতে চাই'}];
    try{
      const reply=await callGemini(init,key);
      setMsgs([{from:'ai',text:reply}]);
      setHist([...init,{role:'assistant',content:reply}]);
    }catch(e){
      const isAuth=e.message.includes('API_KEY_INVALID')||e.message.includes('400');
      if(isAuth){
        setScreen('splash');setModal(true);
      }else{
        const fb='আস্সালামু আলাইকুম! আমি আপনার যাকাত হিসাব করতে সাহায্য করব।\n\nপ্রথমে বলুন—নগদ ও ব্যাংকে মোট কত টাকা আছে?';
        setMsgs([{from:'ai',text:fb}]);
        setHist([...init,{role:'assistant',content:fb}]);
      }
    }
    setLoad(false);setIB(false);
  },[]);

  // Send message
  const sendMsg=useCallback(async text=>{
    if(!text?.trim()||loading)return;
    const t=text.trim();
    const key=localStorage.getItem(LS_KEY);
    if(!key){setModal(true);return;}

    setMsgs(m=>[...m,{from:'user',text:t}]);
    setInput('');setLoad(true);

    const nh=[...history,{role:'user',content:t}];
    try{
      const reply=await callGemini(nh,key);

      // Parse result JSON
      const match=reply.match(/##ZAKAT_RESULT##\s*([\s\S]*?)\s*##ZAKAT_RESULT##/);
      if(match){
        try{
          const data=JSON.parse(match[1]);
          setResult(data);
          setMsgs(m=>[...m,{from:'ai',text:data.msg||'আলহামদুলিল্লাহ!'}]);
          setTimeout(()=>setScreen('result'),2200);
          setHist([...nh,{role:'assistant',content:reply}]);
          setLoad(false);return;
        }catch{}
      }

      setMsgs(m=>[...m,{from:'ai',text:reply}]);
      setHist([...nh,{role:'assistant',content:reply}]);
    }catch(e){
      const isAuth=e.message.includes('API_KEY_INVALID')||e.message.includes('400');
      setMsgs(m=>[...m,{
        from:'ai',
        text:isAuth
          ?'API Key-এ সমস্যা হচ্ছে। নিচে "Key পরিবর্তন" করুন।'
          :'দুঃখিত, সমস্যা হচ্ছে। আবার চেষ্টা করুন।'
      }]);
    }
    setLoad(false);
  },[history,loading]);

  // Voice input
  const toggleVoice=useCallback(()=>{
    if(recording){recRef.current?.stop();setRec(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('ভয়েস ইনপুটের জন্য Chrome ব্যবহার করুন।');return;}
    const r=new SR();
    r.lang='bn-BD';r.continuous=false;r.interimResults=true;
    r.onresult=e=>setInput(Array.from(e.results).map(x=>x[0].transcript).join(''));
    r.onend=()=>setRec(false);
    r.onerror=()=>setRec(false);
    r.start();recRef.current=r;setRec(true);
  },[recording]);

  return(
    <>
      {showModal&&(
        <KeyModal onSave={handleKeySave} existingKey={apiKey}/>
      )}

      {screen==='splash'&&!showModal&&(
        <Splash
          onStart={startChat}
          busy={initBusy}
          onChangeKey={()=>setModal(true)}
        />
      )}

      {screen==='chat'&&!showModal&&(
        <ChatScreen
          messages={msgs} input={input} setInput={setInput}
          loading={loading} recording={recording}
          onSend={sendMsg} onRecord={toggleVoice}
          bottomRef={bottomRef}
        />
      )}

      {screen==='result'&&result&&!showModal&&(
        <ResultScreen result={result} onReset={()=>{
          setScreen('splash');
          setMsgs([]);setHist([]);setResult(null);
        }}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
