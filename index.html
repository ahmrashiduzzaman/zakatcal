<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── Palette ── */
const C={
  bg:'#0C1E13',bgMid:'#112518',
  panel:'rgba(255,255,255,.06)',panelBd:'rgba(212,168,67,.2)',
  green:'#1A5230',greenLt:'#28754A',
  gold:'#D4A843',goldLt:'#EAC96A',
  text:'#F0EBE0',muted:'#8AAD96',
  userBub:'#163E27',aiBub:'rgba(255,255,255,.07)',
  red:'#EF5350',success:'#4CAF50',
  overlay:'rgba(0,0,0,.75)',
};
const FF="'Hind Siliguri',sans-serif";

/* ── Islamic SVG pattern ── */
const ISO=encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><path d='M60 4L116 60L60 116L4 60Z' fill='none' stroke='rgba(212,168,67,0.07)' stroke-width='1'/><path d='M60 18L102 60L60 102L18 60Z' fill='none' stroke='rgba(212,168,67,0.05)' stroke-width='1'/><circle cx='60' cy='60' r='22' fill='none' stroke='rgba(212,168,67,0.04)' stroke-width='1'/></svg>`);
const PATTERN=`url("data:image/svg+xml,${ISO}")`;

/* ── Constants ── */
const GOLD_PG=8000, SILVER_PG=100;
const NISAB=Math.round(612.36*SILVER_PG);
const NISAB_AU=Math.round(87.48*GOLD_PG);
const LS_KEY='asf_zakat_apikey';

/* ── System Prompt ── */
const SYS=`আপনি "যাকাত সহায়ক" — আস-সুন্নাহ ফাউন্ডেশনের AI যাকাত বিশেষজ্ঞ। আপনি বিনয়ী, উষ্ণ এবং সংক্ষিপ্ত।

বর্তমান আনুমানিক বাজারমূল্য (বাংলাদেশ):
• স্বর্ণ (২২ ক্যারেট): ৳৮,০০০/গ্রাম | রূপা: ৳১০০/গ্রাম
• নিসাব (রূপা ৬১২.৩৬ গ্রাম): ৳৬১,২৩৬ | যাকাতের হার: ২.৫%

কথোপকথনের নিয়ম:
১. সবসময় বাংলায় কথা বলুন
২. একবারে একটি মাত্র প্রশ্ন
৩. উত্তর সর্বোচ্চ ২-৩ লাইন
৪. মৌখিক সংখ্যা বুঝুন: পঞ্চাশ হাজার=50000, পাঁচ লক্ষ=500000, এক কোটি=10000000
৫. "নেই/না/নাই" শুনলে পরের প্রশ্নে চলে যান
৬. প্রথম বার্তায় উষ্ণ সালাম ও সংক্ষিপ্ত পরিচয় দিন

সম্পদ সংগ্রহের ক্রম:
১. নগদ টাকা ও ব্যাংক ব্যালেন্স
২. স্বর্ণ → পরিমাণ → "নিয়মিত পরেন নাকি তুলে রাখা?"
৩. রূপা | ৪. ব্যবসায়িক পণ্য | ৫. শেয়ার ও বিনিয়োগ
৬. সঞ্চয়পত্র/FDR (শুধু মূলধন) | ৭. পাওনা টাকা | ৮. ঋণ ও দায়

শরিয়াহ: হানাফি মাযহাবে নিয়মিত পরার গহনায় যাকাত নেই। সঞ্চয়পত্রের মুনাফা গণনায় নেই।

সব তথ্য শেষে শুধু এই JSON দিন:
##ZAKAT_RESULT##
{"cash":0,"gold":0,"silver":0,"business":0,"stocks":0,"savings":0,"receivables":0,"liabilities":0,"net":0,"qualified":true,"zakat":0,"msg":"আলহামদুলিল্লাহ! হিসাব সম্পন্ন।"}
##ZAKAT_RESULT##`;

/* ── Helpers ── */
const fmtBDT=n=>{
  if(!n||isNaN(n))return'৳০';
  const v=Math.abs(Math.round(n));
  if(v>=10000000)return`৳${(v/10000000).toFixed(2)} কোটি`;
  if(v>=100000)return`৳${(v/100000).toFixed(2)} লক্ষ`;
  if(v>=1000)return`৳${(v/1000).toFixed(1)} হাজার`;
  return`৳${v.toLocaleString('en-IN')}`;
};

/* ── Direct Anthropic API call (no backend needed) ── */
const callAPI=async(messages,apiKey)=>{
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:600,
      system:SYS,
      messages
    })
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message||`HTTP ${res.status}`);
  }
  const d=await res.json();
  return d.content[0].text;
};

/* ══════════════════════════════
   API KEY SETUP MODAL
══════════════════════════════ */
function KeyModal({onSave}){
  const[key,setKey]=useState('');
  const[err,setErr]=useState('');
  const[testing,setTest]=useState(false);

  const handleSave=async()=>{
    if(!key.trim().startsWith('sk-ant-')){
      setErr('সঠিক API Key নয়। "sk-ant-" দিয়ে শুরু হওয়া Key দিন।');
      return;
    }
    setTest(true);setErr('');
    try{
      await callAPI([{role:'user',content:'ping'}],key.trim());
      localStorage.setItem(LS_KEY,key.trim());
      onSave(key.trim());
    }catch(e){
      setErr(`Key কাজ করছে না: ${e.message}`);
    }
    setTest(false);
  };

  return(
    <div style={{
      position:'fixed',inset:0,
      background:C.overlay,backdropFilter:'blur(8px)',
      display:'flex',alignItems:'center',justifyContent:'center',
      zIndex:100,padding:'20px'
    }}>
      <div style={{
        background:'#162B1D',
        border:`1.5px solid ${C.gold}`,
        borderRadius:'20px',
        padding:'28px 24px',
        width:'100%',maxWidth:'380px',
        animation:'modalIn .3s ease'
      }}>
        <div style={{textAlign:'center',marginBottom:'22px'}}>
          <div style={{fontSize:'36px',marginBottom:'10px'}}>🔑</div>
          <h2 style={{fontSize:'18px',fontWeight:700,color:C.text,marginBottom:'6px'}}>
            API Key সেটআপ
          </h2>
          <p style={{fontSize:'12px',color:C.muted,lineHeight:1.7}}>
            একবার সেট করলেই চলবে। এটি শুধু আপনার এই ডিভাইসে সংরক্ষিত থাকবে।
          </p>
        </div>

        {/* Steps */}
        <div style={{
          background:C.panel,border:`1px solid ${C.panelBd}`,
          borderRadius:'12px',padding:'14px',marginBottom:'18px',
          fontSize:'12px',color:C.muted,lineHeight:1.9
        }}>
          <strong style={{color:C.gold}}>API Key পাওয়ার উপায়:</strong><br/>
          ১. console.anthropic.com → লগইন করুন<br/>
          ২. <strong style={{color:C.text}}>API Keys</strong> → <strong style={{color:C.text}}>Create Key</strong><br/>
          ৩. Key টি কপি করে নিচে পেস্ট করুন
        </div>

        <input
          type="password"
          value={key}
          onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleSave()}
          placeholder="sk-ant-api03-..."
          style={{
            width:'100%',padding:'13px 16px',
            borderRadius:'12px',
            border:`1px solid ${err?C.red:C.panelBd}`,
            background:'rgba(255,255,255,.05)',
            color:C.text,fontSize:'13px',
            fontFamily:"monospace",
            marginBottom:'8px',outline:'none'
          }}
        />

        {err&&(
          <p style={{color:C.red,fontSize:'12px',marginBottom:'10px',lineHeight:1.5}}>
            ⚠️ {err}
          </p>
        )}

        <button onClick={handleSave} disabled={testing||!key.trim()} style={{
          width:'100%',padding:'14px',
          borderRadius:'50px',
          background:key.trim()&&!testing
            ?`linear-gradient(135deg,${C.gold} 0%,#9F6A18 100%)`
            :'rgba(212,168,67,.3)',
          color:'#0C1E13',fontSize:'15px',fontWeight:700,
          fontFamily:FF,
          display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'
        }}>
          {testing?(
            <>
              <span style={{
                width:'16px',height:'16px',
                border:'2px solid rgba(12,30,19,.3)',
                borderTopColor:'#0C1E13',borderRadius:'50%',
                animation:'spin .7s linear infinite',display:'inline-block'
              }}/>
              যাচাই হচ্ছে…
            </>
          ):'সেভ করুন ও শুরু করুন →'}
        </button>

        <p style={{
          textAlign:'center',marginTop:'14px',
          fontSize:'11px',color:C.muted,opacity:.7,lineHeight:1.6
        }}>
          🔒 Key টি শুধু আপনার ব্রাউজারে সংরক্ষিত।<br/>
          কোনো সার্ভারে যায় না।
        </p>
      </div>
    </div>
  );
}

            <button key={c.val} onClick={()=>onSend(c.val)} style={{
              background:C.panel,border:`1px solid ${C.panelBd}`,
              borderRadius:'20px',padding:'6px 14px',
              color:C.gold,fontSize:'12px',fontFamily:FF,
              whiteSpace:'nowrap',flexShrink:0
            }}>{c.label}</button>
          ))}
        </div>
      )}

      <div style={{
        background:'rgba(12,30,19,.95)',backdropFilter:'blur(14px)',
        borderTop:`1px solid ${C.panelBd}`,
        padding:'10px 12px',
        paddingBottom:'max(10px, env(safe-area-inset-bottom))',
        flexShrink:0
      }}>
        {recording&&(
          <div style={{textAlign:'center',color:C.red,fontSize:'12px',marginBottom:'7px',
            display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
            <span style={{width:'8px',height:'8px',background:C.red,borderRadius:'50%',
              display:'inline-block',animation:'pulse 1s infinite'}}/>
            রেকর্ড হচ্ছে… কথা বলুন
          </div>
        )}
        <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
          <button onClick={onRecord} style={{
            width:'48px',height:'48px',borderRadius:'50%',
            background:recording?'rgba(239,83,80,.18)':C.panel,
            border:`1.5px solid ${recording?C.red:C.panelBd}`,
            color:recording?C.red:C.gold,
            fontSize:'20px',flexShrink:0,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s'
          }}>🎙️</button>

          <textarea
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend(input);}}}
            placeholder="বাংলায় লিখুন বা মাইক্রোফোন ব্যবহার করুন…"
            rows={1}
            style={{
              flex:1,background:C.panel,border:`1px solid ${C.panelBd}`,
              borderRadius:'24px',padding:'12px 16px',
              color:C.text,fontSize:'14px',fontFamily:FF,
              lineHeight:1.55,minHeight:'48px',maxHeight:'120px',overflowY:'auto'
            }}
          />

          <button onClick={()=>onSend(input)} disabled={!input.trim()||loading} style={{
            width:'48px',height:'48px',borderRadius:'50%',border:'none',
            background:input.trim()&&!loading
              ?`linear-gradient(135deg,${C.gold} 0%,#9F6A18 100%)`
              :C.panel,
            color:input.trim()&&!loading?'#0C1E13':C.muted,
            fontSize:'19px',flexShrink:0,
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s'
          }}>➤</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════
   RESULT SCREEN
══════════════════════════════ */
function ResultScreen({result,onReset}){

  const rows=[
    {label:'নগদ ও ব্যাংক',val:result.cash,icon:'💵'},

    {label:'রূপা',val:result.silver,icon:'🥈'},
    {label:'ব্যবসায়িক পণ্য',val:result.business,icon:'📦'},
    {label:'শেয়ার/বিনিয়োগ',val:result.stocks,icon:'📈'},
    {label:'সঞ্চয়পত্র/FDR',val:result.savings,icon:'🏦'},

          <h2 style={{fontSize:'23px',fontWeight:700,color:C.text,marginBottom:'7px'}}>
            {q?'যাকাত ফরজ হয়েছে':'যাকাত ফরজ নয়'}
          </h2>
          <p style={{color:C.muted,fontSize:'13px',lineHeight:1.7}}>
            {q?`নিসাব পূরণ হয়েছে। নিট সম্পদ: ${fmtBDT(net)}`
              :`আপনার সম্পদ নিসাব (${fmtBDT(NISAB)}) অতিক্রম করেনি`}
          </p>
        </div>

        {q&&(
          <div style={{
            borderRadius:'20px',border:`1.5px solid ${C.gold}`,
            background:'linear-gradient(135deg,#163E27 0%,#23623B 100%)',
            padding:'28px 24px',textAlign:'center',
            marginBottom:'16px',animation:'goldGlow 3s ease-in-out infinite'
          }}>
            <p style={{fontSize:'10px',letterSpacing:'3px',color:C.gold,marginBottom:'10px',opacity:.85}}>
              প্রদেয় যাকাত (২.৫%)
            </p>
            <div style={{fontSize:'46px',fontWeight:700,color:C.goldLt,lineHeight:1}}>
              {fmtBDT(zakat)}

              = ৳{Math.round(zakat).toLocaleString('en-IN')} টাকা

        {rows.length>0&&(

            borderRadius:'16px',padding:'16px 18px',marginBottom:'14px'}}>
            <p style={{fontSize:'10px',letterSpacing:'2.5px',color:C.gold,marginBottom:'14px',opacity:.8}}>
              সম্পদের বিবরণ
            </p>
            {rows.map((r,i)=>(
              <div key={r.label} style={{

                borderBottom:i<rows.length-1?'1px solid rgba(255,255,255,.06)':'none'
              }}>
                <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                  <span style={{fontSize:'16px'}}>{r.icon}</span>

            padding:'12px',borderRadius:'12px',
            background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.25)',
            color:'#25D366',fontSize:'13px',fontFamily:FF
          }}>
          💬 WhatsApp-এ আলেমের পরামর্শ নিন

        </p>
      </div>
    </div>
  );
}

/* ══════════════════════════════
   MAIN APP
══════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('splash');
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem(LS_KEY)||'');
  const[showKeyModal,setShowKeyModal]=useState(false);
  const[msgs,setMsgs]   =useState([]);
  const[input,setInput] =useState('');
  const[loading,setLoad]=useState(false);
  const[recording,setRec]=useState(false);
  const[result,setResult]=useState(null);
  const[history,setHist]=useState([]);
  const[initBusy,setIB] =useState(false);

  const bottomRef=useRef(null);
  const recRef   =useRef(null);

  // Show key modal if no key saved
  useEffect(()=>{
    if(!localStorage.getItem(LS_KEY)) setShowKeyModal(true);
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),90);
    return()=>clearTimeout(t);
  },[msgs,loading]);

  const handleKeySave=useCallback((k)=>{
    setApiKey(k);
    setShowKeyModal(false);
  },[]);

  const startChat=useCallback(async()=>{
    if(!apiKey){setShowKeyModal(true);return;}
    setIB(true);setScreen('chat');setLoad(true);
    const init=[{role:'user',content:'যাকাত হিসাব করতে চাই'}];
    try{
      const reply=await callAPI(init,apiKey);
      setMsgs([{from:'ai',text:reply}]);
      setHist([...init,{role:'assistant',content:reply}]);
    }catch(e){
      if(e.message.includes('401')||e.message.includes('auth')){
        setShowKeyModal(true);
        setScreen('splash');
      }else{
        const fb='আস্সালামু আলাইকুম! আমি আপনার যাকাত হিসাব করতে সাহায্য করব।\n\nপ্রথমে বলুন—নগদ ও ব্যাংকে মোট কত টাকা আছে?';
        setMsgs([{from:'ai',text:fb}]);
        setHist([...init,{role:'assistant',content:fb}]);
      }
    }
    setLoad(false);setIB(false);
  },[apiKey]);

  const sendMsg=useCallback(async(text)=>{
    if(!text?.trim()||loading)return;
    const t=text.trim();
    setMsgs(m=>[...m,{from:'user',text:t}]);
    setInput('');setLoad(true);
    const nh=[...history,{role:'user',content:t}];
    try{
      const reply=await callAPI(nh,apiKey);
      const match=reply.match(/##ZAKAT_RESULT##\s*([\s\S]*?)\s*##ZAKAT_RESULT##/);
      if(match){
        try{
          const data=JSON.parse(match[1]);
          setResult(data);
          setMsgs(m=>[...m,{from:'ai',text:data.msg||'আলহামদুলিল্লাহ! হিসাব সম্পন্ন।'}]);
          setTimeout(()=>setScreen('result'),2200);
          setHist([...nh,{role:'assistant',content:reply}]);
          setLoad(false);return;
        }catch{}
      }
      setMsgs(m=>[...m,{from:'ai',text:reply}]);
      setHist([...nh,{role:'assistant',content:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{from:'ai',text:'দুঃখিত, সমস্যা হচ্ছে। আবার চেষ্টা করুন।'}]);
    }
    setLoad(false);
  },[history,loading,apiKey]);

  const toggleVoice=useCallback(()=>{
    if(recording){recRef.current?.stop();setRec(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('ভয়েস ইনপুটের জন্য Chrome ব্যবহার করুন।');return;}
    const r=new SR();
    r.lang='bn-BD';r.continuous=false;r.interimResults=true;
    r.onresult=e=>setInput(Array.from(e.results).map(x=>x[0].transcript).join(''));
    r.onend=()=>setRec(false);r.onerror=()=>setRec(false);
    r.start();recRef.current=r;setRec(true);
  },[recording]);

  return(
    <>
      {showKeyModal&&<KeyModal onSave={handleKeySave}/>}

      {screen==='splash'&&<Splash
        onStart={startChat} busy={initBusy}
        onResetKey={()=>setShowKeyModal(true)}
      />}

      {screen==='chat'&&!showKeyModal&&(
        <ChatScreen
          messages={msgs} input={input} setInput={setInput}
          loading={loading} recording={recording}
          onSend={sendMsg} onRecord={toggleVoice}
          bottomRef={bottomRef}
        />
      )}

      {screen==='result'&&result&&(
        <ResultScreen result={result} onReset={()=>{
          setScreen('splash');setMsgs([]);setHist([]);setResult(null);
        }}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
